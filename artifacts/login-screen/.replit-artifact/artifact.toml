kind = "web"
previewPath = "/"
title = "Login Screen"
version = "1.0.0"
id = "artifacts/login-screen"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23002

[services.development]
run = "pnpm --filter @workspace/login-screen run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/login-screen", "run", "build" ]
publicDir = "artifacts/login-screen/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23002"
BASE_PATH = "/"
